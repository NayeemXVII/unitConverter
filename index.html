<!DOCTYPE html>
<html>
    <head>
        <title>Unit Converter</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <div class="container-clild">

                <div class="header-div">
                    <h1 class="header-text">Metric/Imperial Unit Conversion</h1>
                    <input type="number" id="unit-input" value="20">
                    <button id="convert-btn">Convert</button>
                </div>

                <div class="chield-result">
                    <p class="title">Length (Meter/Feet)</p>
                    <p class="title-result" id="length">20 meters = 65.616 feet | 20 feet = 6.096 meters</p>
                </div>
                <div class="chield-result">
                    <p class="title">Volume (Liters/Gallons)</p>
                    <p class="title-result" id="volume">20 liters = 5.284 gallons | 20 gallons = 6.096 liters</p>
                </div>
                <div class="chield-result">
                    <p class="title">Mass (Kilograms/Pounds)</p>
                    <p class="title-result" id="mass">20 kilos = 44.091 pounds | 20 pounds = 9.072 kilos</p>
                </div>
            </div>
        </div>
        
        <script src="script.js"></script>
    </body>
</html>
